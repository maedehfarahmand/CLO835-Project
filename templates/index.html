<!DOCTYPE html>
<html>
<head>
  <style>
    body { background-image: url("/static/background.jpg"); background-size: cover; color: white; font-family: sans-serif; }
    h1 { text-align: center; }
    table { margin: 20px auto; border-collapse: collapse; background: rgba(0,0,0,0.6); }
    th, td { border: 1px solid white; padding: 8px 12px; }
  </style>
</head>
<body>
  <h1>Welcome — {{ name }}</h1>

  {% if employees %}
    <table>
      <tr>
        {% for key in employees[0].keys() %}
          <th>{{ key }}</th>
        {% endfor %}
      </tr>
      {% for emp in employees %}
        <tr>
          {% for value in emp.values() %}
            <td>{{ value }}</td>
          {% endfor %}
        </tr>
      {% endfor %}
    </table>
  {% else %}
    <p style="text-align:center;">No employee data found.</p>
  {% endif %}
</body>
</html>
